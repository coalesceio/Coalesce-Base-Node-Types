isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |-
    capitalized: SQL Stage
    short: STG
    plural: SQL Stages
    tagColor: '#3ACFC1'

    enableCTESupport: true
    inputMode: 'sql'

    config:
    - groupName: Options
      items:
      - type: metrializationSelector  
        default: table
        options:
        - table
        - view 

      - displayName: CTE Support Toggle
        attributeName: enableCTESupport
        type: toggleButton
        default: true

      - displayName: Truncate Before
        attributeName: truncateBefore
        type: toggleButton
        default: true
        enableIf: "{% if node.materializationType == 'view' %} false {% else %} true {% endif %}"

      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        isRequired: false
        enableIf: "{% if node.materializationType == 'view' %} false {% else %} true {% endif %}"

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        isRequired: false
        enableIf:  "{% if node.materializationType == 'view' %} false {% else %} true {% endif %}"
name: SQL Stage
type: NodeType
